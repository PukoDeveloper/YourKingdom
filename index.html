<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Your Kingdom · 你的王國</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        background: #0d1b2a;
        overflow: hidden;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        position: relative;
      }

      /* HUD */
      #terrain-label {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK TC', sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
        padding: 5px 16px;
        border-radius: 20px;
        pointer-events: none;
        white-space: nowrap;
      }

      #time-label {
        position: fixed;
        top: 14px;
        left: 14px;
        background: rgba(0, 0, 0, 0.55);
        color: #e2c97e;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK TC', sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
        padding: 5px 14px;
        border-radius: 20px;
        pointer-events: none;
        white-space: nowrap;
      }

      #weather-label {
        position: fixed;
        top: 14px;
        right: 14px;
        background: rgba(0, 0, 0, 0.55);
        color: #b3e5fc;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK TC', sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
        padding: 5px 14px;
        border-radius: 20px;
        pointer-events: none;
        white-space: nowrap;
      }

      /* Loading overlay */
      #loading {
        position: fixed;
        inset: 0;
        background: #0d1b2a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999;
        transition: opacity 0.5s ease;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-title {
        color: #e2c97e;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 28px;
        font-weight: bold;
        letter-spacing: 4px;
        margin-bottom: 24px;
      }
      .loading-subtitle {
        color: #90a4ae;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        letter-spacing: 2px;
        margin-bottom: 32px;
      }
      .loading-bar-wrap {
        width: 200px;
        height: 6px;
        background: rgba(255,255,255,0.12);
        border-radius: 3px;
        overflow: hidden;
      }
      .loading-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #e2c97e, #f5e6a3);
        border-radius: 3px;
        transition: width 0.3s ease;
      }
      .loading-status {
        margin-top: 12px;
        color: rgba(255,255,255,0.45);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 12px;
        letter-spacing: 1px;
        min-height: 1.4em;
      }

      /* Mobile control hint */
      #hint {
        position: fixed;
        bottom: 14px;
        right: 14px;
        color: rgba(255,255,255,0.4);
        font-family: sans-serif;
        font-size: 11px;
        pointer-events: none;
      }

      /* =====================================================================
         Tab buttons – top-right, stacked below the weather label
         ===================================================================== */
      #ui-tab-bar {
        position: fixed;
        top: 54px;
        right: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 100;
      }
      .ui-tab-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 2px solid rgba(226,201,126,0.5);
        background: rgba(13,27,42,0.82);
        color: #e2c97e;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.18s, border-color 0.18s, transform 0.12s;
        touch-action: manipulation;
      }
      .ui-tab-btn:hover,
      .ui-tab-btn.active {
        background: rgba(226,201,126,0.22);
        border-color: #e2c97e;
        transform: scale(1.08);
      }

      /* =====================================================================
         Slide-in panel backdrop + drawer
         ===================================================================== */
      #ui-panel {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0);
        z-index: 200;
        display: flex;
        align-items: flex-end;
        pointer-events: none;
        transition: background 0.25s;
      }
      #ui-panel.visible {
        background: rgba(0,0,0,0.52);
        pointer-events: all;
      }
      #ui-panel-inner {
        width: 100%;
        max-width: 520px;
        margin: 0 auto;
        background: #0d1b2a;
        border: 1px solid rgba(226,201,126,0.25);
        border-bottom: none;
        border-radius: 18px 18px 0 0;
        max-height: 72vh;
        display: flex;
        flex-direction: column;
        transform: translateY(100%);
        transition: transform 0.28s cubic-bezier(.4,0,.2,1);
        overflow: hidden;
      }
      #ui-panel.visible #ui-panel-inner {
        transform: translateY(0);
      }
      #ui-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px 10px;
        border-bottom: 1px solid rgba(226,201,126,0.18);
        flex-shrink: 0;
      }
      #ui-panel-title {
        color: #e2c97e;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 17px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      #ui-panel-close {
        background: none;
        border: none;
        color: rgba(255,255,255,0.55);
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
        transition: color 0.15s;
      }
      #ui-panel-close:hover { color: #fff; }
      #ui-panel-content {
        overflow-y: auto;
        padding: 14px 16px 24px;
        flex: 1;
      }

      /* =====================================================================
         Backpack – category tabs, sub-tabs, compact item rows
         ===================================================================== */
      .ui-empty {
        color: rgba(255,255,255,0.4);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 14px;
        text-align: center;
        padding: 28px 0;
      }

      /* Category tabs */
      .bp-cat-tabs {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .bp-cat-btn {
        flex: 1;
        min-width: 56px;
        padding: 6px 4px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(226,201,126,0.2);
        border-radius: 8px;
        color: rgba(255,255,255,0.5);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 3px;
        transition: background 0.15s, color 0.15s;
        touch-action: manipulation;
      }
      .bp-cat-btn.active {
        background: rgba(226,201,126,0.18);
        border-color: #e2c97e;
        color: #e2c97e;
      }
      .bp-cat-btn:hover:not(.active) { background: rgba(255,255,255,0.1); color: #eee; }

      /* Equipment sub-tabs */
      .bp-sub-tabs {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        margin-bottom: 10px;
        padding: 8px 10px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(226,201,126,0.12);
        border-radius: 8px;
      }
      .bp-sub-btn {
        flex: 1;
        min-width: 46px;
        padding: 5px 4px;
        background: transparent;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 6px;
        color: rgba(255,255,255,0.45);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 11px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 3px;
        transition: background 0.15s, color 0.15s;
        touch-action: manipulation;
      }
      .bp-sub-btn.active {
        background: rgba(226,201,126,0.15);
        border-color: rgba(226,201,126,0.5);
        color: #e2c97e;
      }
      .bp-sub-btn:hover:not(.active) { background: rgba(255,255,255,0.08); color: #eee; }

      /* Count badge on tab buttons */
      .bp-cnt {
        background: rgba(226,201,126,0.25);
        color: #e2c97e;
        border-radius: 8px;
        font-size: 10px;
        padding: 0 5px;
        min-width: 16px;
        text-align: center;
        line-height: 15px;
      }

      /* Compact item row list */
      .item-rows { display: flex; flex-direction: column; gap: 5px; }
      .item-row {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(226,201,126,0.15);
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        transition: background 0.15s, border-color 0.15s;
      }
      .item-row:hover { background: rgba(255,255,255,0.11); border-color: rgba(226,201,126,0.35); }
      .ir-icon { font-size: 20px; flex-shrink: 0; width: 24px; text-align: center; }
      .ir-name {
        color: #eee;
        font-size: 14px;
        font-weight: 600;
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .ir-type-tag {
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 8px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        color: rgba(255,255,255,0.45);
        flex-shrink: 0;
        white-space: nowrap;
      }
      .ir-qty {
        color: #e2c97e;
        font-size: 13px;
        flex-shrink: 0;
      }
      .ir-arrow {
        color: rgba(255,255,255,0.3);
        font-size: 18px;
        flex-shrink: 0;
        line-height: 1;
      }

      /* =====================================================================
         Item detail overlay
         ===================================================================== */
      #ui-item-detail-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.65);
        z-index: 300;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      #ui-item-detail-overlay.visible {
        opacity: 1;
        pointer-events: all;
      }
      #ui-item-detail-box {
        background: #0d1b2a;
        border: 1px solid rgba(226,201,126,0.35);
        border-radius: 14px;
        width: 90%;
        max-width: 340px;
        max-height: 75vh;
        overflow-y: auto;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      #ui-item-detail-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px 12px;
        border-bottom: 1px solid rgba(226,201,126,0.18);
        position: sticky;
        top: 0;
        background: #0d1b2a;
        z-index: 1;
      }
      #ui-item-detail-icon { font-size: 26px; flex-shrink: 0; }
      #ui-item-detail-name {
        color: #e2c97e;
        font-size: 16px;
        font-weight: bold;
        letter-spacing: 1px;
        flex: 1;
      }
      #ui-item-detail-close {
        background: none;
        border: none;
        color: rgba(255,255,255,0.55);
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
        transition: color 0.15s;
      }
      #ui-item-detail-close:hover { color: #fff; }
      #ui-item-detail-body { padding: 14px 16px 20px; }
      .id-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .id-desc-row {
        padding: 8px 10px;
        background: rgba(255,255,255,0.04);
        border-radius: 7px;
        margin-bottom: 12px;
      }
      .id-label {
        color: rgba(255,255,255,0.4);
        font-size: 12px;
        min-width: 36px;
        flex-shrink: 0;
      }
      .id-value {
        color: #eee;
        font-size: 13px;
        flex: 1;
      }
      .id-type-tag {
        background: rgba(226,201,126,0.12);
        border: 1px solid rgba(226,201,126,0.3);
        color: #e2c97e;
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 12px;
        flex: 0;
      }
      .id-desc {
        color: rgba(255,255,255,0.55);
        font-size: 13px;
        line-height: 1.6;
      }
      .id-stats-row {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }
      .id-stat {
        flex: 1;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(226,201,126,0.13);
        border-radius: 8px;
        padding: 8px 4px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      .id-stat-label { color: rgba(255,255,255,0.4); font-size: 11px; }
      .id-stat-val { color: #e2c97e; font-size: 17px; font-weight: bold; line-height: 1; }
      .id-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding-top: 12px;
        border-top: 1px solid rgba(255,255,255,0.07);
      }
      .btn-item-use {
        flex: 1;
        padding: 8px 10px;
        background: rgba(226,201,126,0.15);
        border: 1px solid rgba(226,201,126,0.4);
        color: #e2c97e;
        border-radius: 8px;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-item-use:hover { background: rgba(226,201,126,0.28); }
      .btn-item-discard {
        flex: 1;
        padding: 8px 10px;
        background: rgba(211,47,47,0.12);
        border: 1px solid rgba(211,47,47,0.35);
        color: #ef9a9a;
        border-radius: 8px;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-item-discard:hover { background: rgba(211,47,47,0.26); }

      /* =====================================================================
         Team – squad tabs
         ===================================================================== */
      .squad-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }
      .squad-tab-btn {
        flex: 1;
        padding: 8px 4px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(226,201,126,0.22);
        border-radius: 8px;
        color: rgba(255,255,255,0.55);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        line-height: 1.35;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        touch-action: manipulation;
      }
      .squad-tab-btn small { font-size: 11px; color: #e2c97e; }
      .squad-tab-btn.active {
        background: rgba(226,201,126,0.18);
        border-color: #e2c97e;
        color: #e2c97e;
      }
      .squad-stat {
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 12px;
        color: rgba(255,255,255,0.45);
        margin-bottom: 10px;
      }
      .unit-section { margin-bottom: 14px; }
      .section-label {
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 12px;
        color: rgba(226,201,126,0.7);
        letter-spacing: 1px;
        margin-bottom: 8px;
        text-transform: uppercase;
      }
      .unit-card {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(226,201,126,0.18);
        border-radius: 10px;
        padding: 10px 12px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      .unit-card.empty {
        opacity: 0.4;
        border-style: dashed;
      }
      .unit-card.captain { border-color: rgba(226,201,126,0.65); background: rgba(226,201,126,0.08); }
      .unit-card.inactive { opacity: 0.5; }
      .unit-card.general { border-color: rgba(226,201,126,0.45); }
      .unit-badge {
        font-size: 12px;
        color: rgba(255,255,255,0.5);
        min-width: 48px;
      }
      .unit-name {
        color: #eee;
        font-size: 14px;
        font-weight: 600;
        flex: 1;
      }
      .unit-role {
        color: #90a4ae;
        font-size: 12px;
      }
      .unit-stats {
        color: rgba(255,255,255,0.45);
        font-size: 11px;
      }
      .unit-empty {
        color: rgba(255,255,255,0.35);
        font-size: 12px;
      }
      .btn-remove-gen,
      .btn-remove-sol,
      .btn-remove-member {
        background: rgba(211,47,47,0.18);
        border: 1px solid rgba(211,47,47,0.4);
        color: #ef9a9a;
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 13px;
        cursor: pointer;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        transition: background 0.15s;
      }
      .btn-remove-gen:hover,
      .btn-remove-sol:hover,
      .btn-remove-member:hover { background: rgba(211,47,47,0.35); }
      /* Override: unit-detail remove button is intentionally smaller */
      .btn-remove-member {
        padding: 4px 10px;
        font-size: 11px;
      }
      .soldier-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .soldier-grid .unit-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 3px;
        margin-bottom: 0;
      }
      .soldier-grid .btn-remove-sol { margin-left: 0; align-self: flex-end; }

      /* Member list */
      .member-list { display: flex; flex-direction: column; gap: 6px; }

      /* Compact unit card (click to view detail) */
      .unit-card-compact {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(226,201,126,0.18);
        border-radius: 10px;
        padding: 11px 14px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      .unit-card-compact:hover { background: rgba(255,255,255,0.11); border-color: rgba(226,201,126,0.38); }
      .unit-card-compact.captain { border-color: rgba(226,201,126,0.65); background: rgba(226,201,126,0.08); }
      .unit-card-compact.inactive { opacity: 0.55; }
      .unit-card-compact.empty { opacity: 0.4; border-style: dashed; cursor: default; pointer-events: none; }
      .ucc-badge { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
      .ucc-name {
        color: #eee;
        font-size: 14px;
        font-weight: 600;
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .ucc-empty { color: rgba(255,255,255,0.35); font-weight: 400; }
      .ucc-role {
        color: #90a4ae;
        font-size: 12px;
        flex-shrink: 0;
        white-space: nowrap;
      }
      .ucc-status {
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 10px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        color: rgba(255,255,255,0.45);
        flex-shrink: 0;
        white-space: nowrap;
      }
      .ucc-status.active {
        background: rgba(56,142,60,0.18);
        border-color: rgba(56,142,60,0.4);
        color: #a5d6a7;
      }
      .ucc-arrow {
        color: rgba(255,255,255,0.3);
        font-size: 18px;
        flex-shrink: 0;
        line-height: 1;
      }

      /* =====================================================================
         Unit detail overlay
         ===================================================================== */
      #ui-unit-detail-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.65);
        z-index: 300;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      #ui-unit-detail-overlay.visible {
        opacity: 1;
        pointer-events: all;
      }
      #ui-unit-detail-box {
        background: #0d1b2a;
        border: 1px solid rgba(226,201,126,0.35);
        border-radius: 14px;
        width: 90%;
        max-width: 360px;
        max-height: 80vh;
        overflow-y: auto;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      #ui-unit-detail-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px 12px;
        border-bottom: 1px solid rgba(226,201,126,0.18);
        position: sticky;
        top: 0;
        background: #0d1b2a;
        z-index: 1;
      }
      #ui-unit-detail-name {
        color: #e2c97e;
        font-size: 16px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      #ui-unit-detail-close {
        background: none;
        border: none;
        color: rgba(255,255,255,0.55);
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
        transition: color 0.15s;
      }
