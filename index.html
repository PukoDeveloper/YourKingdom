<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Your Kingdom · 你的王國</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        background: #0d1b2a;
        overflow: hidden;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        position: relative;
      }

      /* HUD */
      #terrain-label {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK TC', sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
        padding: 5px 16px;
        border-radius: 20px;
        pointer-events: none;
        white-space: nowrap;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        line-height: 1.4;
        gap: 1px;
      }
      .hud-nation-line {
        font-size: 11px;
        opacity: 0.75;
        letter-spacing: 0.5px;
      }
      .hud-region-line {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1px;
      }

      #time-label {
        position: fixed;
        top: 14px;
        left: 14px;
        background: rgba(0, 0, 0, 0.55);
        color: #e2c97e;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK TC', sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
        padding: 5px 14px;
        border-radius: 20px;
        pointer-events: none;
        white-space: nowrap;
      }

      #weather-label {
        position: fixed;
        top: 14px;
        right: 14px;
        background: rgba(0, 0, 0, 0.55);
        color: #b3e5fc;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK TC', sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
        padding: 5px 14px;
        border-radius: 20px;
        pointer-events: none;
        white-space: nowrap;
      }

      /* Loading overlay */
      #loading {
        position: fixed;
        inset: 0;
        background: #0d1b2a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999;
        transition: opacity 0.5s ease;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-title {
        color: #e2c97e;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 28px;
        font-weight: bold;
        letter-spacing: 4px;
        margin-bottom: 24px;
      }
      .loading-subtitle {
        color: #90a4ae;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        letter-spacing: 2px;
        margin-bottom: 32px;
      }
      .loading-bar-wrap {
        width: 200px;
        height: 6px;
        background: rgba(255,255,255,0.12);
        border-radius: 3px;
        overflow: hidden;
      }
      .loading-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #e2c97e, #f5e6a3);
        border-radius: 3px;
        transition: width 0.3s ease;
      }
      .loading-status {
        margin-top: 12px;
        color: rgba(255,255,255,0.45);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 12px;
        letter-spacing: 1px;
        min-height: 1.4em;
      }

      /* Mobile control hint */
      #hint {
        position: fixed;
        bottom: 14px;
        right: 14px;
        color: rgba(255,255,255,0.4);
        font-family: sans-serif;
        font-size: 11px;
        pointer-events: none;
      }

      /* =====================================================================
         Tab buttons – top-right, stacked below the weather label
         ===================================================================== */
      #ui-tab-bar {
        position: fixed;
        top: 54px;
        right: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 100;
      }
      .ui-tab-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 2px solid rgba(226,201,126,0.5);
        background: rgba(13,27,42,0.82);
        color: #e2c97e;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.18s, border-color 0.18s, transform 0.12s;
        touch-action: manipulation;
      }
      .ui-tab-btn:hover,
      .ui-tab-btn.active {
        background: rgba(226,201,126,0.22);
        border-color: #e2c97e;
        transform: scale(1.08);
      }

      /* =====================================================================
         Slide-in panel backdrop + drawer
         ===================================================================== */
      #ui-panel {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0);
        z-index: 200;
        display: flex;
        align-items: flex-end;
        pointer-events: none;
        transition: background 0.25s;
      }
      #ui-panel.visible {
        background: rgba(0,0,0,0.52);
        pointer-events: all;
      }
      #ui-panel-inner {
        width: 100%;
        max-width: 520px;
        margin: 0 auto;
        background: #0d1b2a;
        border: 1px solid rgba(226,201,126,0.25);
        border-bottom: none;
        border-radius: 18px 18px 0 0;
        max-height: 72vh;
        display: flex;
        flex-direction: column;
        transform: translateY(100%);
        transition: transform 0.28s cubic-bezier(.4,0,.2,1);
        overflow: hidden;
      }
      #ui-panel.visible #ui-panel-inner {
        transform: translateY(0);
      }
      #ui-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px 10px;
        border-bottom: 1px solid rgba(226,201,126,0.18);
        flex-shrink: 0;
      }
      #ui-panel-title {
        color: #e2c97e;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 17px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      #ui-panel-close {
        background: none;
        border: none;
        color: rgba(255,255,255,0.55);
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
        transition: color 0.15s;
      }
      #ui-panel-close:hover { color: #fff; }
      #ui-panel-content {
        overflow-y: auto;
        padding: 14px 16px 24px;
        flex: 1;
      }

      /* =====================================================================
         Backpack – category tabs, sub-tabs, compact item rows
         ===================================================================== */
      .ui-empty {
        color: rgba(255,255,255,0.4);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 14px;
        text-align: center;
        padding: 28px 0;
      }

      /* Category tabs */
      .bp-cat-tabs {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .bp-cat-btn {
        flex: 1;
        min-width: 56px;
        padding: 6px 4px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(226,201,126,0.2);
        border-radius: 8px;
        color: rgba(255,255,255,0.5);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 3px;
        transition: background 0.15s, color 0.15s;
        touch-action: manipulation;
      }
      .bp-cat-btn.active {
        background: rgba(226,201,126,0.18);
        border-color: #e2c97e;
        color: #e2c97e;
      }
      .bp-cat-btn:hover:not(.active) { background: rgba(255,255,255,0.1); color: #eee; }

      /* Equipment sub-tabs */
      .bp-sub-tabs {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        margin-bottom: 10px;
        padding: 8px 10px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(226,201,126,0.12);
        border-radius: 8px;
      }
      .bp-sub-btn {
        flex: 1;
        min-width: 46px;
        padding: 5px 4px;
        background: transparent;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 6px;
        color: rgba(255,255,255,0.45);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 11px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 3px;
        transition: background 0.15s, color 0.15s;
        touch-action: manipulation;
      }
      .bp-sub-btn.active {
        background: rgba(226,201,126,0.15);
        border-color: rgba(226,201,126,0.5);
        color: #e2c97e;
      }
      .bp-sub-btn:hover:not(.active) { background: rgba(255,255,255,0.08); color: #eee; }

      /* Count badge on tab buttons */
      .bp-cnt {
        background: rgba(226,201,126,0.25);
        color: #e2c97e;
        border-radius: 8px;
        font-size: 10px;
        padding: 0 5px;
        min-width: 16px;
        text-align: center;
        line-height: 15px;
      }

      /* Compact item row list */
      .item-rows { display: flex; flex-direction: column; gap: 5px; }
      .item-row {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(226,201,126,0.15);
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        transition: background 0.15s, border-color 0.15s;
      }
      .item-row:hover { background: rgba(255,255,255,0.11); border-color: rgba(226,201,126,0.35); }
      .ir-icon { font-size: 20px; flex-shrink: 0; width: 24px; text-align: center; }
      .ir-name {
        color: #eee;
        font-size: 14px;
        font-weight: 600;
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .ir-type-tag {
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 8px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        color: rgba(255,255,255,0.45);
        flex-shrink: 0;
        white-space: nowrap;
      }
      .ir-qty {
        color: #e2c97e;
        font-size: 13px;
        flex-shrink: 0;
      }
      .ir-arrow {
        color: rgba(255,255,255,0.3);
        font-size: 18px;
        flex-shrink: 0;
        line-height: 1;
      }

      /* =====================================================================
         Item detail overlay
         ===================================================================== */
      #ui-item-detail-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.65);
        z-index: 300;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      #ui-item-detail-overlay.visible {
        opacity: 1;
        pointer-events: all;
      }
      #ui-item-detail-box {
        background: #0d1b2a;
        border: 1px solid rgba(226,201,126,0.35);
        border-radius: 14px;
        width: 90%;
        max-width: 340px;
        max-height: 75vh;
        overflow-y: auto;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      #ui-item-detail-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px 12px;
        border-bottom: 1px solid rgba(226,201,126,0.18);
        position: sticky;
        top: 0;
        background: #0d1b2a;
        z-index: 1;
      }
      #ui-item-detail-icon { font-size: 26px; flex-shrink: 0; }
      #ui-item-detail-name {
        color: #e2c97e;
        font-size: 16px;
        font-weight: bold;
        letter-spacing: 1px;
        flex: 1;
      }
      #ui-item-detail-close {
        background: none;
        border: none;
        color: rgba(255,255,255,0.55);
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
        transition: color 0.15s;
      }
      #ui-item-detail-close:hover { color: #fff; }
      #ui-item-detail-body { padding: 14px 16px 20px; }
      .id-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .id-desc-row {
        padding: 8px 10px;
        background: rgba(255,255,255,0.04);
        border-radius: 7px;
        margin-bottom: 12px;
      }
      .id-label {
        color: rgba(255,255,255,0.4);
        font-size: 12px;
        min-width: 36px;
        flex-shrink: 0;
      }
      .id-value {
        color: #eee;
        font-size: 13px;
        flex: 1;
      }
      .id-type-tag {
        background: rgba(226,201,126,0.12);
        border: 1px solid rgba(226,201,126,0.3);
        color: #e2c97e;
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 12px;
        flex: 0;
      }
      .id-desc {
        color: rgba(255,255,255,0.55);
        font-size: 13px;
        line-height: 1.6;
      }
      .id-stats-row {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }
      .id-stat {
        flex: 1;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(226,201,126,0.13);
        border-radius: 8px;
        padding: 8px 4px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      .id-stat-label { color: rgba(255,255,255,0.4); font-size: 11px; }
      .id-stat-val { color: #e2c97e; font-size: 17px; font-weight: bold; line-height: 1; }
      .id-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding-top: 12px;
        border-top: 1px solid rgba(255,255,255,0.07);
      }
      .btn-item-use {
        flex: 1;
        padding: 8px 10px;
        background: rgba(226,201,126,0.15);
        border: 1px solid rgba(226,201,126,0.4);
        color: #e2c97e;
        border-radius: 8px;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-item-use:hover { background: rgba(226,201,126,0.28); }
      .btn-item-discard {
        flex: 1;
        padding: 8px 10px;
        background: rgba(211,47,47,0.12);
        border: 1px solid rgba(211,47,47,0.35);
        color: #ef9a9a;
        border-radius: 8px;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-item-discard:hover { background: rgba(211,47,47,0.26); }

      /* =====================================================================
         Minimap overlay
         ===================================================================== */
      #ui-minimap-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.75);
        z-index: 350;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      #ui-minimap-overlay.visible {
        opacity: 1;
        pointer-events: all;
      }
      #ui-minimap-box {
        background: #0a1520;
        border: 1px solid rgba(226,201,126,0.4);
        border-radius: 14px;
        width: 92%;
        max-width: 420px;
        overflow: hidden;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      #ui-minimap-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px 10px;
        border-bottom: 1px solid rgba(226,201,126,0.18);
      }
      #ui-minimap-title {
        color: #e2c97e;
        font-size: 15px;
        font-weight: bold;
        letter-spacing: 1px;
        flex: 1;
      }
      #ui-minimap-close {
        background: none;
        border: none;
        color: rgba(255,255,255,0.55);
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
        transition: color 0.15s;
      }
      #ui-minimap-close:hover { color: #fff; }
      #ui-minimap-canvas-wrap {
        padding: 12px;
        display: flex;
        justify-content: center;
        background: #0a1520;
      }
      #ui-minimap-canvas {
        display: block;
        border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.1);
        image-rendering: pixelated;
      }
      /* Minimap layer tabs */
      #ui-minimap-tabs {
        display: flex;
        gap: 8px;
        padding: 8px 14px 0;
      }
      .mm-tab-btn {
        flex: 1;
        padding: 6px 4px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(226,201,126,0.22);
        border-radius: 8px;
        color: rgba(255,255,255,0.5);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        touch-action: manipulation;
        letter-spacing: 1px;
      }
      .mm-tab-btn.active {
        background: rgba(226,201,126,0.18);
        border-color: #e2c97e;
        color: #e2c97e;
      }
      .mm-tab-btn:hover:not(.active) { background: rgba(255,255,255,0.1); color: #eee; }
      #ui-minimap-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 12px;
        padding: 8px 14px 14px;
        border-top: 1px solid rgba(255,255,255,0.07);
      }
      .mm-legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: rgba(255,255,255,0.55);
      }
      .mm-legend-item.mm-legend-icon {
        font-size: 12px;
      }
      .mm-legend-swatch {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        flex-shrink: 0;
        border: 1px solid rgba(255,255,255,0.15);
      }

      /* =====================================================================
         Team – main tabs (隊伍 / 資訊)
         ===================================================================== */
      .team-main-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }
      .team-main-tab-btn {
        flex: 1;
        padding: 8px 4px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(226,201,126,0.22);
        border-radius: 8px;
        color: rgba(255,255,255,0.55);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        touch-action: manipulation;
      }
      .team-main-tab-btn.active {
        background: rgba(226,201,126,0.18);
        border-color: #e2c97e;
        color: #e2c97e;
      }
      .team-main-tab-btn:hover:not(.active) { background: rgba(255,255,255,0.1); color: #eee; }

      /* Team – info tab */
      .team-info-section {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(226,201,126,0.15);
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 10px;
      }
      .team-info-title {
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 12px;
        color: rgba(226,201,126,0.8);
        letter-spacing: 1px;
        margin-bottom: 8px;
      }
      .team-info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        padding: 4px 0;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .team-info-row:last-child { border-bottom: none; }
      .team-info-label { color: rgba(255,255,255,0.5); }
      .team-info-value { color: #eee; font-weight: 600; }
      .team-info-value.warn { color: #ff7777; }
      .team-info-squad-row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 12px;
        padding: 4px 0;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .team-info-squad-row:last-child { border-bottom: none; }
      .team-info-squad-name { color: rgba(226,201,126,0.9); min-width: 42px; font-size: 13px; }
      .team-info-squad-stat {
        color: rgba(255,255,255,0.75);
        background: rgba(255,255,255,0.07);
        padding: 2px 7px;
        border-radius: 4px;
      }

      /* =====================================================================
         Team – squad tabs
         ===================================================================== */
      .squad-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }
      .squad-tab-btn {
        flex: 1;
        padding: 8px 4px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(226,201,126,0.22);
        border-radius: 8px;
        color: rgba(255,255,255,0.55);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        line-height: 1.35;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        touch-action: manipulation;
      }
      .squad-tab-btn small { font-size: 11px; color: #e2c97e; }
      .squad-tab-btn.active {
        background: rgba(226,201,126,0.18);
        border-color: #e2c97e;
        color: #e2c97e;
      }
      .squad-stat {
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 12px;

        position: fixed;
        inset: 0;
        background: var(--battle-bg, linear-gradient(180deg, #112a14 0%, #0d2210 55%, #1a3a14 100%));
        z-index: 500;
        display: flex;
        align-items: stretch;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK TC', sans-serif;
      }
      #battle-scene-overlay.visible { opacity: 1; pointer-events: all; }
      #battle-scene-inner {
        width: 100%;
        max-width: 520px;
        display: flex;
        flex-direction: column;
        padding: 16px 16px 28px;
        gap: 10px;
      }
      #battle-scene-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 2px 6px;
        border-bottom: 1px solid rgba(255,255,255,0.14);
        flex-shrink: 0;
      }
      #battle-scene-terrain-name {
        color: #e2c97e;
        font-size: 16px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      #battle-scene-round-label { color: rgba(255,255,255,0.5); font-size: 13px; }
      #battle-scene-field {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        gap: 6px;
        overflow: hidden;
      }
      #battle-enemy-row, #battle-player-row {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
      }
      .btl-row-label {
        color: rgba(255,255,255,0.42);
        font-size: 11px;
        letter-spacing: 1px;
      }
      .btl-unit-row {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        justify-content: center;
        align-items: flex-end;
      }
      .btl-unit-enemy {
        font-size: 22px;
        line-height: 1;
        filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
        transition: opacity 0.3s;
      }
      .btl-leader { font-size: 28px; }
      .btl-unit-player {
        display: inline-block;
        filter: drop-shadow(0 1px 4px rgba(0,0,0,0.7));
        transition: opacity 0.3s;
      }
      .btl-fallen {
        opacity: 0.2;
        filter: grayscale(100%) drop-shadow(0 1px 3px rgba(0,0,0,0.5));
      }
      #battle-scene-vs-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 2px 0;
        flex-shrink: 0;
      }
      #battle-enemy-hp-bar-wrap, #battle-player-hp-bar-wrap {
        flex: 1;
        height: 8px;
        background: rgba(255,255,255,0.12);
        border-radius: 4px;
        overflow: hidden;
      }
      #battle-enemy-hp-bar {
        height: 100%;
        background: linear-gradient(90deg, #b71c1c, #ef5350);
        border-radius: 4px;
        transition: width 0.45s ease;
        width: 100%;
      }
      #battle-player-hp-bar {
        height: 100%;
        background: linear-gradient(90deg, #1565c0, #42a5f5);
        border-radius: 4px;
        transition: width 0.45s ease;
        width: 100%;
      }
      #battle-scene-vs {
        color: rgba(255,255,255,0.55);
        font-size: 11px;
        white-space: nowrap;
        flex-shrink: 0;
        text-align: center;
        min-width: 110px;
      }
      #battle-scene-log {
        background: rgba(0,0,0,0.38);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px;
        padding: 9px 13px;
        min-height: 58px;
        flex-shrink: 0;
      }
      .btl-log-line { color: rgba(255,255,255,0.6); font-size: 12px; line-height: 1.65; }
      .btl-log-line:last-child { color: #eee; font-weight: 600; }
      #battle-scene-actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
        flex-wrap: wrap;
      }
      .btn-battle-cmd {
        flex: 1;
        padding: 13px 6px;
        background: rgba(255,255,255,0.09);
        border: 1px solid rgba(255,255,255,0.22);
        border-radius: 12px;
        color: #eee;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, transform 0.1s;
        touch-action: manipulation;
        letter-spacing: 1px;
      }
      .btn-battle-cmd:hover { background: rgba(255,255,255,0.18); }
      .btn-battle-cmd:active { transform: scale(0.96); }
      #btn-battle-attack {
        background: rgba(183,28,28,0.22);
        border-color: rgba(229,57,53,0.55);
        color: #ef9a9a;
      }
      #btn-battle-attack:hover { background: rgba(183,28,28,0.38); }
      #btn-battle-defend {
        background: rgba(25,118,210,0.18);
        border-color: rgba(25,118,210,0.45);
        color: #90caf9;
      }
      #btn-battle-defend:hover { background: rgba(25,118,210,0.32); }
      #btn-battle-retreat { color: rgba(255,255,255,0.58); }
      #btn-battle-retreat:hover { color: #eee; }
      .btl-result {
        flex: 0 0 100%;
        padding: 13px;
        border-radius: 12px;
        font-size: 18px;
        font-weight: bold;
        text-align: center;
        letter-spacing: 2px;
      }
      .btl-result-victory { background: rgba(56,142,60,0.25); border: 1px solid rgba(56,142,60,0.55); color: #a5d6a7; }
      .btl-result-defeat  { background: rgba(183,28,28,0.22); border: 1px solid rgba(229,57,53,0.55); color: #ef9a9a; }
      .btl-result-draw    { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: #eee; }
      .btl-result-retreat { background: rgba(255,152,0,0.14); border: 1px solid rgba(255,152,0,0.4); color: #ffcc02; }
      .btn-battle-exit {
        flex: 1;
        padding: 13px 6px;
        background: rgba(255,255,255,0.09);
        border: 1px solid rgba(255,255,255,0.28);
        border-radius: 12px;
        color: #eee;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        touch-action: manipulation;
        letter-spacing: 1px;
      }
      .btn-battle-exit:hover { background: rgba(255,255,255,0.18); }
      /* Capture (佔領) button shown on victory */
      .btn-battle-capture {
        flex: 1;
        padding: 13px 6px;
        background: rgba(226,201,126,0.18);
        border: 1px solid rgba(226,201,126,0.55);
        border-radius: 12px;
        color: #e2c97e;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        touch-action: manipulation;
        letter-spacing: 1px;
      }
      .btn-battle-capture:hover { background: rgba(226,201,126,0.28); }
      /* Plunder (掠奪) button shown on victory */
      .btn-battle-plunder {
        flex: 1;
        padding: 13px 6px;
        background: rgba(255,152,0,0.18);
        border: 1px solid rgba(255,152,0,0.55);
        border-radius: 12px;
        color: #ffcc80;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        touch-action: manipulation;
        letter-spacing: 1px;
      }
      .btn-battle-plunder:hover { background: rgba(255,152,0,0.30); }
      /* Liberate (解放) button shown on victory */
      .btn-battle-liberate {
        flex: 1;
        padding: 13px 6px;
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.45);
        border-radius: 12px;
        color: #e0e0e0;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        touch-action: manipulation;
        letter-spacing: 1px;
      }
      .btn-battle-liberate:hover { background: rgba(255,255,255,0.22); }
      /* Already-captured badge shown after occupation */
      .btl-captured-badge {
        flex: 1;
        padding: 13px 6px;
        background: rgba(226,201,126,0.1);
        border: 1px solid rgba(226,201,126,0.3);
        border-radius: 12px;
        color: rgba(226,201,126,0.7);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        text-align: center;
        letter-spacing: 1px;
      }
      /* Already-liberated badge shown after liberation */
      .btl-liberated-badge {
        flex: 1;
        padding: 13px 6px;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.28);
        border-radius: 12px;
        color: rgba(220,220,220,0.7);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        text-align: center;
        letter-spacing: 1px;
      }

      /* =====================================================================
         Location screen overlay
         ===================================================================== */
      #location-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.75);
        z-index: 400;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
      }
      #location-overlay.visible {
        opacity: 1;
        pointer-events: all;
      }
      #location-box {
        background: #0d1b2a;
        border: 1px solid rgba(226,201,126,0.35);
        border-bottom: none;
        border-radius: 18px 18px 0 0;
        width: 100%;
        max-width: 480px;
        max-height: 85vh;
        display: flex;
        flex-direction: column;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK TC', sans-serif;
        transform: translateY(30px);
        transition: transform 0.25s;
      }
      #location-overlay.visible #location-box {
        transform: translateY(0);
      }
      #location-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 16px 18px 14px;
        border-bottom: 1px solid rgba(226,201,126,0.18);
        flex-shrink: 0;
      }
      #location-icon { font-size: 26px; flex-shrink: 0; line-height: 1; }
      #location-title {
        flex: 1;
        color: #e2c97e;
        font-size: 17px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      #location-subtitle {
        color: rgba(255,255,255,0.4);
        font-size: 11px;
        letter-spacing: 0.5px;
        margin-top: 2px;
      }
      #location-close {
        background: none;
        border: none;
        color: rgba(255,255,255,0.5);
        font-size: 20px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
        transition: color 0.15s;
        touch-action: manipulation;
      }
      #location-close:hover { color: #fff; }
      #location-content {
        overflow-y: auto;
        flex: 1;
        padding: 16px 16px 24px;
      }

      /* Gate scene */
      .loc-gate-scene {
        text-align: center;
        padding: 10px 0 8px;
      }
      .loc-gate-art {
        font-size: 56px;
        line-height: 1;
        margin-bottom: 14px;
        filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
      }
      .loc-gate-msg {
        color: rgba(255,255,255,0.75);
        font-size: 14px;
        line-height: 1.7;
        margin-bottom: 20px;
        padding: 0 8px;
      }
      .loc-gate-msg em {
        color: #e2c97e;
        font-style: normal;
        font-weight: 600;
      }
      .loc-gate-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn-loc-enter {
        padding: 11px 28px;
        background: rgba(226,201,126,0.18);
        border: 1.5px solid rgba(226,201,126,0.7);
        border-radius: 10px;
        color: #e2c97e;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        touch-action: manipulation;
      }
      .btn-loc-enter:hover { background: rgba(226,201,126,0.3); }
      .btn-loc-leave {
        padding: 11px 20px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 10px;
        color: rgba(255,255,255,0.55);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.15s;
        touch-action: manipulation;
      }
      .btn-loc-leave:hover { background: rgba(255,255,255,0.12); color: #eee; }

      /* Facilities grid */
      .loc-back-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }
      .btn-loc-back {
        background: none;
        border: none;
        color: rgba(255,255,255,0.45);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        cursor: pointer;
        padding: 4px 0;
        touch-action: manipulation;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .btn-loc-back:hover { color: #e2c97e; }
      .loc-facilities-title {
        color: rgba(255,255,255,0.45);
        font-size: 12px;
        letter-spacing: 1px;
        margin-bottom: 12px;
      }
      .loc-facilities-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      .facility-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(226,201,126,0.18);
        border-radius: 12px;
        padding: 16px 12px 14px;
        cursor: pointer;
        text-align: center;
        transition: background 0.15s, border-color 0.15s, transform 0.1s;
        touch-action: manipulation;
      }
      .facility-card:hover {
        background: rgba(255,255,255,0.09);
        border-color: rgba(226,201,126,0.4);
      }
      .facility-card:active { transform: scale(0.97); }
      .fc-icon { font-size: 32px; line-height: 1; margin-bottom: 8px; }
      .fc-name {
        color: #eee;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .fc-desc {
        color: rgba(255,255,255,0.4);
        font-size: 11px;
        line-height: 1.4;
      }

      /* ── Facility interior screens ──────────────────────────────── */
      .fac-back-row {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
      }
      .btn-fac-back {
        background: none;
        border: none;
        color: rgba(255,255,255,0.45);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        cursor: pointer;
        padding: 4px 0;
        touch-action: manipulation;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .btn-fac-back:hover { color: #e2c97e; }
      .fac-title {
        color: #e2c97e;
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 10px;
      }
      .fac-gold-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 14px;
        color: #e2c97e;
        font-size: 13px;
        font-weight: 600;
        background: rgba(226,201,126,0.08);
        border: 1px solid rgba(226,201,126,0.2);
        border-radius: 8px;
        padding: 6px 12px;
      }

      /* ── Shop item rows ─────────────────────────────────────────── */
      .shop-item-list { display: flex; flex-direction: column; gap: 8px; }
      .shop-item-row {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(226,201,126,0.15);
        border-radius: 10px;
        padding: 10px 12px;
      }
      .sir-icon { font-size: 24px; min-width: 28px; text-align: center; }
      .sir-info { flex: 1; min-width: 0; }
      .sir-name { color: #eee; font-size: 13px; font-weight: 600; }
      .sir-desc { color: rgba(255,255,255,0.4); font-size: 11px; margin-top: 2px; }
      .sir-stat { color: #90caf9; font-size: 11px; font-weight: 600; margin-left: 4px; }
      .sir-price {
        color: #e2c97e;
        font-size: 13px;
        font-weight: 700;
        white-space: nowrap;
        min-width: 46px;
        text-align: right;
      }
      .btn-buy {
        padding: 6px 14px;
        background: rgba(226,201,126,0.18);
        border: 1.5px solid rgba(226,201,126,0.6);
        border-radius: 8px;
        color: #e2c97e;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.12s;
        touch-action: manipulation;
        white-space: nowrap;
      }
      .btn-buy:hover { background: rgba(226,201,126,0.32); }
      .btn-buy:disabled { opacity: 0.4; cursor: not-allowed; }

      /* ── Inn screen ──────────────────────────────────────────────── */
      .inn-scene-art {
        font-size: 48px;
        text-align: center;
        margin: 8px 0 6px;
      }
      .inn-scene-msg {
        color: rgba(255,255,255,0.7);
        font-size: 13px;
        line-height: 1.7;
        text-align: center;
        margin-bottom: 16px;
        padding: 0 8px;
      }
      .inn-scene-msg em {
        color: #e2c97e;
        font-style: normal;
        font-weight: 600;
      }
      .inn-wounded-note {
        color: #ff8f00;
        font-size: 12px;
        text-align: center;
        margin-bottom: 12px;
      }
      .inn-options { display: flex; flex-direction: column; gap: 10px; }
      .inn-option-card {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(226,201,126,0.15);
        border-radius: 10px;
        padding: 12px 14px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .ioc-icon { font-size: 26px; }
      .ioc-info { flex: 1; }
      .ioc-title { color: #eee; font-size: 13px; font-weight: 600; }
      .ioc-desc  { color: rgba(255,255,255,0.4); font-size: 11px; margin-top: 3px; }

      /* ── Tavern screen ───────────────────────────────────────────── */
      .tavern-section-title {
        color: rgba(255,255,255,0.4);
        font-size: 11px;
        letter-spacing: 1px;
        margin: 14px 0 8px;
        text-transform: uppercase;
      }
      .recruit-list { display: flex; flex-direction: column; gap: 8px; }
      .recruit-card {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(226,201,126,0.15);
        border-radius: 10px;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .rc-info { flex: 1; min-width: 0; }
      .rc-name  { color: #eee; font-size: 13px; font-weight: 600; }
      .rc-role  { color: rgba(255,255,255,0.5); font-size: 11px; margin-left: 6px; }
      .rc-stats  { color: rgba(255,255,255,0.45); font-size: 11px; margin-top: 2px; }
      .rc-traits { color: #ce93d8; font-size: 11px; margin-top: 2px; }
      .recruit-card.recruited { opacity: 0.45; }

      /* ── Government building screen ─────────────────────────────── */
      .gov-ruler-section {
        display: flex;
        align-items: center;
        gap: 14px;
        margin: 10px 0 14px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(226,201,126,0.15);
        border-radius: 10px;
        padding: 14px;
      }
      .gov-ruler-icon { font-size: 36px; }
      .gov-ruler-name { color: #e2c97e; font-size: 15px; font-weight: 700; }
      .gov-ruler-role { color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 2px; }
      .gov-ruler-traits { color: #ce93d8; font-size: 11px; margin-top: 4px; }
      .gov-stats-row {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
      }
      .gov-stat {
        flex: 1;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px;
        padding: 8px 10px;
        text-align: center;
      }
      .gov-stat-label { display: block; color: rgba(255,255,255,0.4); font-size: 10px; margin-bottom: 4px; }
      .gov-stat-val   { display: block; color: #eee; font-size: 13px; font-weight: 600; }
      .gov-ruler-speech {
        color: rgba(255,255,255,0.6);
        font-size: 13px;
        line-height: 1.7;
        padding: 12px;
        background: rgba(255,255,255,0.03);
        border-radius: 8px;
        border-left: 3px solid rgba(226,201,126,0.4);
      }
      .gov-ruler-speech em {
        color: #e2c97e;
        font-style: normal;
      }
      /* ── Tax / satisfaction section ─────────────────────────────── */
      .gov-tax-section {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(226,201,126,0.2);
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 14px;
      }
      .gov-tax-title {
        color: #e2c97e;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 1px;
        margin-bottom: 10px;
      }
      .gov-stat-row-small {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
        font-size: 12px;
      }
      .gov-sat-val { font-weight: 600; font-size: 12px; }
      .gov-tax-btn {
        margin-top: 10px;
        width: 100%;
      }

      /* =====================================================================
         Foreign city-hall diplomacy panel
         ===================================================================== */
      .gov-foreign-diplo-section {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(100,181,246,0.2);
