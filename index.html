<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Your Kingdom · 你的王國</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        background: #0d1b2a;
        overflow: hidden;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        position: relative;
      }

      /* HUD */
      #terrain-label {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK TC', sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
        padding: 5px 16px;
        border-radius: 20px;
        pointer-events: none;
        white-space: nowrap;
      }

      #time-label {
        position: fixed;
        top: 14px;
        left: 14px;
        background: rgba(0, 0, 0, 0.55);
        color: #e2c97e;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK TC', sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
        padding: 5px 14px;
        border-radius: 20px;
        pointer-events: none;
        white-space: nowrap;
      }

      #weather-label {
        position: fixed;
        top: 14px;
        right: 14px;
        background: rgba(0, 0, 0, 0.55);
        color: #b3e5fc;
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans CJK TC', sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
        padding: 5px 14px;
        border-radius: 20px;
        pointer-events: none;
        white-space: nowrap;
      }

      /* Loading overlay */
      #loading {
        position: fixed;
        inset: 0;
        background: #0d1b2a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999;
        transition: opacity 0.5s ease;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-title {
        color: #e2c97e;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 28px;
        font-weight: bold;
        letter-spacing: 4px;
        margin-bottom: 24px;
      }
      .loading-subtitle {
        color: #90a4ae;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        letter-spacing: 2px;
        margin-bottom: 32px;
      }
      .loading-bar-wrap {
        width: 200px;
        height: 6px;
        background: rgba(255,255,255,0.12);
        border-radius: 3px;
        overflow: hidden;
      }
      .loading-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #e2c97e, #f5e6a3);
        border-radius: 3px;
        transition: width 0.3s ease;
      }
      .loading-status {
        margin-top: 12px;
        color: rgba(255,255,255,0.45);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 12px;
        letter-spacing: 1px;
        min-height: 1.4em;
      }

      /* Mobile control hint */
      #hint {
        position: fixed;
        bottom: 14px;
        right: 14px;
        color: rgba(255,255,255,0.4);
        font-family: sans-serif;
        font-size: 11px;
        pointer-events: none;
      }

      /* =====================================================================
         Tab buttons – top-right, stacked below the weather label
         ===================================================================== */
      #ui-tab-bar {
        position: fixed;
        top: 54px;
        right: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 100;
      }
      .ui-tab-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 2px solid rgba(226,201,126,0.5);
        background: rgba(13,27,42,0.82);
        color: #e2c97e;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.18s, border-color 0.18s, transform 0.12s;
        touch-action: manipulation;
      }
      .ui-tab-btn:hover,
      .ui-tab-btn.active {
        background: rgba(226,201,126,0.22);
        border-color: #e2c97e;
        transform: scale(1.08);
      }

      /* =====================================================================
         Slide-in panel backdrop + drawer
         ===================================================================== */
      #ui-panel {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0);
        z-index: 200;
        display: flex;
        align-items: flex-end;
        pointer-events: none;
        transition: background 0.25s;
      }
      #ui-panel.visible {
        background: rgba(0,0,0,0.52);
        pointer-events: all;
      }
      #ui-panel-inner {
        width: 100%;
        max-width: 520px;
        margin: 0 auto;
        background: #0d1b2a;
        border: 1px solid rgba(226,201,126,0.25);
        border-bottom: none;
        border-radius: 18px 18px 0 0;
        max-height: 72vh;
        display: flex;
        flex-direction: column;
        transform: translateY(100%);
        transition: transform 0.28s cubic-bezier(.4,0,.2,1);
        overflow: hidden;
      }
      #ui-panel.visible #ui-panel-inner {
        transform: translateY(0);
      }
      #ui-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px 10px;
        border-bottom: 1px solid rgba(226,201,126,0.18);
        flex-shrink: 0;
      }
      #ui-panel-title {
        color: #e2c97e;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 17px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      #ui-panel-close {
        background: none;
        border: none;
        color: rgba(255,255,255,0.55);
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
        transition: color 0.15s;
      }
      #ui-panel-close:hover { color: #fff; }
      #ui-panel-content {
        overflow-y: auto;
        padding: 14px 16px 24px;
        flex: 1;
      }

      /* =====================================================================
         Backpack – item grid
         ===================================================================== */
      .item-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 10px;
      }
      .item-card {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(226,201,126,0.18);
        border-radius: 10px;
        padding: 10px 10px 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        text-align: center;
      }
      .item-icon { font-size: 28px; line-height: 1; }
      .item-name {
        color: #eee;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        font-weight: 600;
      }
      .item-qty {
        color: #e2c97e;
        font-size: 12px;
      }
      .item-desc {
        color: #90a4ae;
        font-size: 11px;
      }
      .btn-use {
        margin-top: 4px;
        background: rgba(226,201,126,0.18);
        border: 1px solid rgba(226,201,126,0.4);
        color: #e2c97e;
        border-radius: 6px;
        padding: 3px 12px;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-use:hover { background: rgba(226,201,126,0.32); }
      .ui-empty {
        color: rgba(255,255,255,0.4);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 14px;
        text-align: center;
        padding: 28px 0;
      }

      /* =====================================================================
         Team – squad tabs
         ===================================================================== */
      .squad-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }
      .squad-tab-btn {
        flex: 1;
        padding: 8px 4px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(226,201,126,0.22);
        border-radius: 8px;
        color: rgba(255,255,255,0.55);
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        line-height: 1.35;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        touch-action: manipulation;
      }
      .squad-tab-btn small { font-size: 11px; color: #e2c97e; }
      .squad-tab-btn.active {
        background: rgba(226,201,126,0.18);
        border-color: #e2c97e;
        color: #e2c97e;
      }
      .squad-stat {
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 12px;
        color: rgba(255,255,255,0.45);
        margin-bottom: 10px;
      }
      .unit-section { margin-bottom: 14px; }
      .section-label {
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 12px;
        color: rgba(226,201,126,0.7);
        letter-spacing: 1px;
        margin-bottom: 8px;
        text-transform: uppercase;
      }
      .unit-card {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(226,201,126,0.18);
        border-radius: 10px;
        padding: 10px 12px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      .unit-card.empty {
        opacity: 0.4;
        border-style: dashed;
      }
      .unit-card.captain { border-color: rgba(226,201,126,0.65); background: rgba(226,201,126,0.08); }
      .unit-card.inactive { opacity: 0.5; }
      .unit-card.general { border-color: rgba(226,201,126,0.45); }
      .unit-badge {
        font-size: 12px;
        color: rgba(255,255,255,0.5);
        min-width: 48px;
      }
      .unit-name {
        color: #eee;
        font-size: 14px;
        font-weight: 600;
        flex: 1;
      }
      .unit-role {
        color: #90a4ae;
        font-size: 12px;
      }
      .unit-stats {
        color: rgba(255,255,255,0.45);
        font-size: 11px;
      }
      .unit-empty {
        color: rgba(255,255,255,0.35);
        font-size: 12px;
      }
      .btn-remove-gen,
      .btn-remove-sol,
      .btn-remove-member {
        margin-left: auto;
        background: rgba(211,47,47,0.18);
        border: 1px solid rgba(211,47,47,0.4);
        color: #ef9a9a;
        border-radius: 6px;
        padding: 3px 10px;
        font-size: 11px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-remove-gen:hover,
      .btn-remove-sol:hover,
      .btn-remove-member:hover { background: rgba(211,47,47,0.35); }
      .soldier-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .soldier-grid .unit-card {
        flex-direction: column;
        align-items: flex-start;
        gap: 3px;
        margin-bottom: 0;
      }
      .soldier-grid .btn-remove-sol { margin-left: 0; align-self: flex-end; }

      /* Member list (replaces soldier-grid for unified member view) */
      .member-list { display: flex; flex-direction: column; gap: 6px; }
      .member-list .unit-card.member {
        flex-wrap: wrap;
        align-items: center;
      }

      /* Trait tags */
      .unit-traits {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        width: 100%;
        margin-top: 2px;
      }
      .trait-tag {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: rgba(255,255,255,0.7);
        border-radius: 4px;
        padding: 1px 6px;
        font-size: 11px;
      }
      .trait-tag.trait-captain {
        background: rgba(226,201,126,0.18);
        border-color: rgba(226,201,126,0.5);
        color: #e2c97e;
      }

      /* Unit card action row */
      .unit-card-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        width: 100%;
        margin-top: 4px;
      }
      .unit-card-actions button {
        border-radius: 6px;
        padding: 3px 8px;
        font-size: 11px;
        cursor: pointer;
        transition: background 0.15s;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      .btn-set-captain {
        background: rgba(226,201,126,0.15);
        border: 1px solid rgba(226,201,126,0.4);
        color: #e2c97e;
      }
      .btn-set-captain:hover { background: rgba(226,201,126,0.3); }
      .btn-toggle-active {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.2);
        color: rgba(255,255,255,0.55);
      }
      .btn-toggle-active.is-active {
        background: rgba(56,142,60,0.2);
        border-color: rgba(56,142,60,0.5);
        color: #a5d6a7;
      }
      .btn-toggle-active:hover { filter: brightness(1.2); }
      .btn-move {
        background: rgba(25,118,210,0.15);
        border: 1px solid rgba(25,118,210,0.4);
        color: #90caf9;
      }
      .btn-move.active {
        background: rgba(25,118,210,0.3);
        border-color: #90caf9;
      }
      .btn-move:hover { background: rgba(25,118,210,0.28); }

      /* Move target panel */
      .move-targets {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        width: 100%;
        padding: 6px 0 2px;
      }
      .btn-move-to {
        background: rgba(25,118,210,0.18);
        border: 1px solid rgba(25,118,210,0.45);
        color: #90caf9;
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        transition: background 0.15s;
      }
      .btn-move-to:hover { background: rgba(25,118,210,0.32); }
      .btn-move-to:disabled { opacity: 0.4; cursor: not-allowed; }

      /* =====================================================================
         Acquire dialog
         ===================================================================== */
      #ui-acquire-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.65);
        z-index: 400;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      #ui-acquire-overlay.visible {
        opacity: 1;
        pointer-events: all;
      }
      #ui-acquire-box {
        background: #0d1b2a;
        border: 1px solid rgba(226,201,126,0.35);
        border-radius: 14px;
        padding: 24px 28px;
        max-width: 320px;
        width: 90%;
        text-align: center;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      }
      #ui-acquire-title {
        color: #e2c97e;
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 10px;
      }
      #ui-acquire-desc {
        color: rgba(255,255,255,0.6);
        font-size: 13px;
        margin-bottom: 18px;
        line-height: 1.5;
      }
      #ui-acquire-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
      }
      #ui-acquire-actions button {
        flex: 1;
        padding: 9px 6px;
        border-radius: 8px;
        border: 1px solid rgba(226,201,126,0.35);
        background: rgba(255,255,255,0.07);
        color: #e2c97e;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s;
      }
      #ui-acquire-actions button:hover { background: rgba(226,201,126,0.18); }
      #ui-acquire-actions button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      /* =====================================================================
         Toast notification
         ===================================================================== */
      #ui-toast {
        position: fixed;
        bottom: 90px;
        left: 50%;
        transform: translateX(-50%) translateY(12px);
        background: rgba(13,27,42,0.92);
        border: 1px solid rgba(226,201,126,0.3);
        color: #e2c97e;
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        font-size: 13px;
        padding: 8px 20px;
        border-radius: 20px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s, transform 0.25s;
        z-index: 500;
      }
      #ui-toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="loading-title">你的王國</div>
      <div class="loading-subtitle">YOUR KINGDOM</div>
      <div class="loading-bar-wrap">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <div class="loading-status" id="loading-status">初始化...</div>
    </div>

    <div id="game-container"></div>
    <div id="terrain-label">草原</div>
    <div id="time-label">清晨  06:28</div>
    <div id="weather-label">☀ 晴天</div>
    <div id="hint">WASD / 搖桿 移動</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
